appId: ai.opencowork.codesign
productName: open-codesign
directories:
  buildResources: resources
  output: release
files:
  - out/**
  - package.json
asar: true
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  target:
    - target: dmg
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64, arm64]
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Graphics
publish:
  provider: github
  owner: OpenCoworkAI
  repo: open-codesign
  # releaseType: draft — softprops/action-gh-release controls draft/final;
  # electron-builder is set to "release" so it uploads to an existing tag.
  releaseType: release
